<!DOCTYPE html>
<html lang="js">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mitame.css">
    <title>公共の人物をはゔぁーって学べるやつ</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>

    <div id="main">
        <div id="zimb2" class="area"> <!--人物-->
            <div class="page loby">
                <div class="column">
                    <div class="setsu">モード選択</div>
                    <div class="mode m">
                        <div class="opener koma"></div>
                        <div class="body"></div>
                    </div>
                </div>

                <div class="column">
                    <div class="setsu">問題数選択</div>
                    <div class="mode q">
                        <div class="opener koma"></div>
                        <div class="body"></div>
                    </div>
                </div>

                <div class="column">
                    <div class="setsu">追加コンテンツ選択</div>
                    <div class="addcon"></div>
                </div>

                <div class="go koma">行ってみYO!!</div>
            </div>

            <div class="page play">
                <div class="bar dai">
                    <div class="inner"></div>
                </div>

                <div class="up">
                    <div class="end">×</div>
                    <div class="mode"></div>
                    <img class="error" src="assets/images/systems/error.png"/>
                </div>

                <div class="main">
                    <div class="title">
                        <div class="title2"></div>
                        <div class="add"></div>
                        <div class="time">
                            <img class="icon" src="assets/images/systems/time.png"/>
                            <div class="column">
                                <div class="text">time(未実装)</div>
                                <div class="bar">
                                    <div class="inner"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="list"></div>
                </div>
            </div>

            <div class="page result">
                <div class="detail"></div>
                <div class="score"></div>
                <div class="back">戻る</div>
            </div>
        </div>
    </div>

    <script src="data.js" defer></script>
    <script src="nakami.js" defer></script>
</body>
</html>
